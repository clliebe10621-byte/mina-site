<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>カレンダー — ゆい × 湊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="cal-page">

    <div class="cal-app">

        <!-- ヘッダー -->
        <header class="cal-header">
            <div class="cal-nav">
                <button class="cal-nav-btn" onclick="prevMonth()">‹</button>
                <span id="calMonthLabel" class="cal-month-label"></span>
                <button class="cal-nav-btn" onclick="nextMonth()">›</button>
            </div>
            <button class="cal-schedule-btn" onclick="openScheduleModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                デフォルト設定
            </button>
        </header>

        <!-- グリッド + 詳細パネル -->
        <div class="cal-body">
            <div class="cal-grid-wrap">
                <div class="cal-grid" id="calGrid"></div>
            </div>
            <div class="cal-detail" id="calDetail">
                <div class="cal-detail-empty">日付を選んでください</div>
            </div>
        </div>

    </div>

    <!-- タブバー -->
    <nav class="tab-bar">
        <a href="index.html" class="tab-item"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>チャット</span></a>
        <a href="calendar.html" class="tab-item active"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>カレンダー</span></a>
        <a href="memory.html" class="tab-item"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>記憶</span></a>
        <a href="story.html" class="tab-item"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span>ストーリー</span></a>
        <a href="character.html" class="tab-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>設定</span></a>
    </nav>

    <!-- ── きろく追加モーダル ── -->
    <div class="modal-backdrop" id="eventModalBackdrop"></div>
    <div class="modal" id="eventModal">
        <div class="modal-header">
            <span class="modal-title" id="eventModalTitle">きろくを追加</span>
            <button class="modal-close" onclick="closeEventModal()">×</button>
        </div>
        <form id="eventForm" class="modal-body">
            <div class="form-group">
                <label class="form-label">なにをした？</label>
                <div class="quick-type-grid" id="quickTypeGrid"></div>
                <input type="hidden" id="eventQuickType" value="">
            </div>
            <div class="form-group">
                <label class="form-label">タイトル（任意）</label>
                <input type="text" id="eventTitle" class="form-input" placeholder="例：イタリアンディナー">
            </div>
            <div class="form-group">
                <label class="form-label">ひとことメモ（任意）</label>
                <textarea id="eventMemo" class="form-input form-textarea" placeholder="今日のこと、ひとことで…" rows="3"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">開始時間（任意）</label>
                    <input type="time" id="eventStartTime" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">終了時間（任意）</label>
                    <input type="time" id="eventEndTime" class="form-input">
                </div>
            </div>
            <button type="submit" id="eventSubmitBtn" class="form-submit" disabled>保存する</button>
        </form>
    </div>

    <!-- ── デフォルトスケジュールモーダル ── -->
    <div class="modal-backdrop" id="scheduleModalBackdrop"></div>
    <div class="modal" id="scheduleModal">
        <div class="modal-header">
            <span class="modal-title">デフォルト設定</span>
            <button class="modal-close" onclick="closeScheduleModal()">×</button>
        </div>
        <div class="modal-body">
            <p class="schedule-note">予定がない日に適用されるデフォルトの場所・モードを設定できます。</p>
            <div class="schedule-section">
                <h3 class="schedule-day-label">平日</h3>
                <div id="scheduleWeekday"></div>
            </div>
            <div class="schedule-section">
                <h3 class="schedule-day-label">土日・祝日</h3>
                <div id="scheduleWeekend"></div>
            </div>
            <button id="scheduleSaveBtn" class="form-submit" onclick="handleSaveSchedule()">保存する</button>
        </div>
    </div>

    <script src="js/calendar.js"></script>
</body>
</html>
